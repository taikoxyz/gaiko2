name: gaiko2

x-gaiko2-tee-common: &gaiko2-tee-common
  build:
    context: .
    dockerfile: docker/Dockerfile.tee
  image: ${GAIKO2_TEE_IMAGE:-gaiko2-tee:latest}
  environment:
    GAIKO2_PROVING_MODE: tee
    GAIKO2_TEE_TYPE: ${GAIKO2_TEE_TYPE:-ego}
    GAIKO2_CONFIG_DIR: /var/lib/gaiko2/config
    GAIKO2_SECRET_DIR: /var/lib/gaiko2/secrets
    GAIKO2_PORT: "8080"
    GAIKO2_FORK: ${GAIKO2_FORK:-}
    GAIKO2_INSTANCE_ID: ${GAIKO2_INSTANCE_ID:-}
    PCCS_HOST: ${PCCS_HOST:-host.docker.internal:8081}
  devices:
    - /dev/sgx_enclave:/dev/sgx_enclave
    - /dev/sgx_provision:/dev/sgx_provision
  volumes:
    - ${GAIKO2_CONFIG_DIR_HOST:-./var/config}:/var/lib/gaiko2/config
    - ${GAIKO2_SECRET_DIR_HOST:-./var/secrets}:/var/lib/gaiko2/secrets
  extra_hosts:
    - host.docker.internal:host-gateway

services:
  gaiko2-native:
    build:
      context: .
      dockerfile: docker/Dockerfile.native
    image: ${GAIKO2_NATIVE_IMAGE:-gaiko2-native:latest}
    environment:
      GAIKO2_PROVING_MODE: native
      GAIKO2_PORT: "8080"
    ports:
      - "${GAIKO2_NATIVE_PORT:-8080}:8080"
    restart: unless-stopped
    stop_grace_period: 35s
  gaiko2-tee-init:
    <<: *gaiko2-tee-common
    command:
      - --init
    restart: "no"
    profiles:
      - tee-init

  gaiko2-tee:
    <<: *gaiko2-tee-common
    ports:
      - "${GAIKO2_TEE_PORT:-8080}:8080"
    restart: unless-stopped
    stop_grace_period: 35s
    profiles:
      - tee
